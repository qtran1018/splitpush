# Production Configuration for Render with Supabase
# All database credentials should be provided via environment variables

# Server Configuration
# Render provides PORT environment variable, use it if available
server.port=${PORT:8080}

# Database Configuration (Supabase PostgreSQL)
# All values should come from environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/splitpush}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:splitpush_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:splitpush_pass}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Thymeleaf Configuration (enable caching in production)
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Application Configuration
app.name=Splitpush

# Logging Configuration (production)
logging.level.root=INFO
logging.level.com.splitpush=INFO


