<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Splitpush</title>
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
        }
        .auth-brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-brand-icon {
            width: 56px;
            height: 56px;
            background: var(--accent-color);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin-bottom: 0.75rem;
        }
        .auth-brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }
        .auth-brand p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }
        .auth-divider {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 1.5rem 0;
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover { text-decoration: underline; }
        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
        }
    </style>
</head>
<body>
    <button id="theme-toggle" class="theme-toggle btn btn-secondary" onclick="toggleTheme()" aria-label="Toggle dark mode" style="padding:0.4rem 0.7rem;font-size:1.1rem;">🌙</button>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="auth-brand-icon">✈️</div>
                <h1>Travel Platform</h1>
                <p>Sign in to Splitpush</p>
            </div>

            <div th:if="${param.error}" class="alert alert-error" style="margin-bottom:1rem;">
                Login failed. Please try again.
            </div>
            <div th:if="${param.logout}" class="alert alert-success" style="margin-bottom:1rem;">
                You have been signed out successfully.
            </div>

            <a th:href="@{/oauth2/authorization/keycloak}" class="btn btn-primary">
                Sign In
            </a>

            <hr class="auth-divider">

            <div class="auth-footer">
                Don't have an account? <a th:href="@{/register}">Create one</a>
            </div>
        </div>
    </div>

    <script th:src="@{/js/theme-toggle.js}"></script>
</body>
</html>
