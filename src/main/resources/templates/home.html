<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <title>Splitpush - Split Expenses Easily</title>
    <script>
        // Apply theme immediately to prevent flash
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .home-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            color: var(--text-primary);
            transition: color 0.3s ease;
        }
        
        .home-brand {
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px var(--shadow);
            color: var(--accent-color);
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }
        
        .home-tagline {
            font-size: 24px;
            margin-bottom: 50px;
            opacity: 0.9;
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }
        
        .home-buttons {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }
        
        .home-buttons .btn {
            min-width: 180px;
            padding: 15px 30px;
            font-size: 18px;
        }

        @media (max-width: 480px) {
            .home-brand {
                font-size: 48px;
            }

            .home-tagline {
                font-size: 18px;
                margin-bottom: 30px;
            }

            .home-buttons {
                flex-direction: column;
                width: 100%;
                padding: 0 20px;
            }

            .home-buttons .btn {
                width: 100%;
                min-width: 0;
                padding: 12px 24px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div style="position: absolute; top: 20px; right: 20px;">
        <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">🌙</button>
    </div>
    <div class="home-container">
        <h1 class="home-brand">Splitpush</h1>
        <p class="home-tagline">Split expenses easily with friends and groups</p>
        <div class="home-buttons">
            <a th:href="@{/register}" class="btn btn-primary">Create Account</a>
            <a th:href="@{/login}" class="btn btn-secondary">Log In</a>
        </div>
    </div>
    <script th:src="@{/js/theme-toggle.js}"></script>
</body>
</html>
