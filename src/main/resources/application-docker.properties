# Docker Configuration
# Supports both local Docker PostgreSQL and external databases (e.g., Supabase)
# Environment variables override defaults for flexibility

# Server Configuration
server.port=${SERVER_PORT:8080}

# Database Configuration
# Defaults to local Docker postgres service, but can be overridden via environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/splitpush}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:splitpush_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:splitpush_pass}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Keycloak OIDC
spring.security.oauth2.client.registration.keycloak.client-id=splitpush
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:splitpush-secret}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.keycloak.issuer-uri=${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/travel-platform}
spring.security.oauth2.client.provider.keycloak.user-name-attribute=email

