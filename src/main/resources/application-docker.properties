# Docker profile.
# KeycloakClientConfig.java provides the ClientRegistrationRepository bean directly,
# bypassing Spring Boot's issuer-uri-driven auto-configuration.  These properties are
# read by @Value in that class.

# Server
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://platform-postgres:5432/splitpush}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:splitpush_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:splitpush_pass}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.org.springframework.security.oauth2=DEBUG
logging.level.org.springframework.security.web=DEBUG

# Keycloak client-secret (also read by KeycloakClientConfig via the standard property path)
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:splitpush-secret}

# Keycloak endpoint URIs injected into KeycloakClientConfig.
# authorization-uri uses localhost:8180 (browser-accessible).
# token/userinfo/jwk use the internal container name (server-to-server).
keycloak.auth-uri=${KEYCLOAK_AUTH_URI:https://auth.quangntran.com/realms/travel-platform/protocol/openid-connect/auth}
keycloak.token-uri=${KEYCLOAK_TOKEN_URI:https://auth.quangntran.com/realms/travel-platform/protocol/openid-connect/token}
keycloak.jwk-uri=${KEYCLOAK_JWK_URI:https://auth.quangntran.com/realms/travel-platform/protocol/openid-connect/certs}
keycloak.end-session-uri=${KEYCLOAK_END_SESSION_URI:https://auth.quangntran.com/realms/travel-platform/protocol/openid-connect/logout}
keycloak.register-uri=${KEYCLOAK_REGISTER_URI:https://auth.quangntran.com/realms/travel-platform/protocol/openid-connect/registrations}
app.base-url=${APP_BASE_URL:https://splitpush.quangntran.com}
# No keycloak.userinfo-uri — user claims come from the ID token instead of a UserInfo HTTP call
