services:
  postgres:
    image: postgres:16-alpine
    container_name: splitpush-postgres
    environment:
      POSTGRES_DB: splitpush
      POSTGRES_USER: splitpush_user
      POSTGRES_PASSWORD: splitpush_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitpush_user -d splitpush"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - splitpush-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: splitpush-app
    ports:
      - "8080:8080"
    environment:
      # Spring profile - use 'docker' for local development
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-docker}
      # Database configuration - defaults to local postgres, can be overridden for external DB
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/splitpush}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-splitpush_user}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-splitpush_pass}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:-org.postgresql.Driver}
      # JPA configuration
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      - SPRING_JPA_SHOW_SQL=${SPRING_JPA_SHOW_SQL:-false}
      # Server port
      - SERVER_PORT=${SERVER_PORT:-8080}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - splitpush-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  splitpush-network:
    driver: bridge


