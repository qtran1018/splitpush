services:
  postgres:
    image: postgres:16-alpine
    container_name: splitpush-postgres
    environment:
      POSTGRES_DB: splitpush
      POSTGRES_USER: splitpush_user
      POSTGRES_PASSWORD: splitpush_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitpush_user -d splitpush"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

