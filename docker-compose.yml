services:
  postgres:
    image: postgres:16-alpine
    container_name: splitpush-postgres
    profiles: ["standalone"]
    environment:
      POSTGRES_DB: splitpush
      POSTGRES_USER: splitpush_user
      POSTGRES_PASSWORD: splitpush_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitpush_user -d splitpush"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travelplatform-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: splitpush-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${POSTGRES_HOST:-platform-postgres}:5432/splitpush
      - SPRING_DATASOURCE_USERNAME=splitpush_user
      - SPRING_DATASOURCE_PASSWORD=splitpush_pass
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=false
      - SERVER_PORT=8080
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    networks:
      - travelplatform-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  travelplatform-network:
    external: true
